<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset your password</title>
</head>
<body style="font-family: sans-serif; background: #f9f9f9; padding: 40px 0;">
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background: #fff; border-radius: 8px; padding: 40px; border: 1px solid #e5e5e5;">
          <tr>
            <td>
              <h2 style="margin: 0 0 16px;">Reset your password</h2>
              <p style="color: #555;">Hi {{.Name}},</p>
              <p style="color: #555;">We received a request to reset your password. Click the button below to set a new password. This link expires in <strong>{{.ExpireIn}}</strong>.</p>
              <div style="text-align: center; padding: 24px 0;">
                <a href="{{.ResetUrl}}" style="background: #111; color: #fff; padding: 12px 32px; border-radius: 6px; text-decoration: none; font-weight: bold;">Reset Password</a>
              </div>
              <p style="color: #555; font-size: 13px;">Or copy this link: <a href="{{.ResetUrl}}" style="color: #555;">{{.ResetUrl}}</a></p>
              <p style="color: #999; font-size: 12px;">If you did not request a password reset, you can safely ignore this email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
