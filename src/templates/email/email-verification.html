<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verify your email</title>
</head>
<body style="font-family: sans-serif; background: #f9f9f9; padding: 40px 0;">
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background: #fff; border-radius: 8px; padding: 40px; border: 1px solid #e5e5e5;">
          <tr>
            <td>
              <h2 style="margin: 0 0 16px;">Verify your email</h2>
              <p style="color: #555;">Hi {{.Name}},</p>
              <p style="color: #555;">Thank you for signing up. Please verify your email address to complete your registration.</p>
              <p style="color: #555;">Your verification code will expire in <strong>{{.ExpireIn}}</strong>.</p>
              <p style="color: #999; font-size: 12px;">If you did not create an account, you can safely ignore this email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
