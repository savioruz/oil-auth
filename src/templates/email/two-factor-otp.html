<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your verification code</title>
</head>
<body style="font-family: sans-serif; background: #f9f9f9; padding: 40px 0;">
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background: #fff; border-radius: 8px; padding: 40px; border: 1px solid #e5e5e5;">
          <tr>
            <td>
              <h2 style="margin: 0 0 16px;">Your verification code</h2>
              <p style="color: #555;">Hi {{.Name}},</p>
              <p style="color: #555;">Use the code below to complete your sign-in. It expires in <strong>{{.ExpireIn}}</strong>.</p>
              <div style="font-size: 32px; font-weight: bold; letter-spacing: 8px; text-align: center; padding: 24px 0; color: #111;">
                {{.Otp}}
              </div>
              <p style="color: #999; font-size: 12px;">If you did not request this code, you can safely ignore this email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
