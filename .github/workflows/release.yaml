name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

# Builds on the native hosted runners first (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm);
# if that attempt fails, the same release body re-runs entirely on self-hosted runners. Once the
# image(s) are published, github-release generates the changelog and cuts the GitHub Release.
jobs:
  primary:
    name: hosted runners
    uses: ./.github/workflows/_release.yaml
    with:
      amd_runner: ubuntu-latest
      arm_runner: ubuntu-24.04-arm
    secrets: inherit

  fallback:
    name: self-hosted fallback
    needs: [primary]
    if: ${{ always() && needs.primary.result == 'failure' }}
    uses: ./.github/workflows/_release.yaml
    with:
      amd_runner: self-hosted
      arm_runner: self-hosted
    secrets: inherit

  github-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [primary, fallback]
    if: ${{ !cancelled() && (needs.primary.result == 'success' || needs.fallback.result == 'success') }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: metcalfc/changelog-generator@v4
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
