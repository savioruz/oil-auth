name: Release (reusable)

# Reusable release body. Invoked by release.yaml with the native runners first, then re-invoked
# on self-hosted only if the first attempt fails. Runners are supplied by the caller: the amd64
# build + manifest use `amd_runner`, the arm64 build uses `arm_runner`.
on:
  workflow_call:
    inputs:
      amd_runner:
        description: Runner for the amd64 build and the manifest job.
        required: true
        type: string
      arm_runner:
        description: Runner for the arm64 build.
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-amd64:
    name: Docker Build (AMD64)
    runs-on: ${{ inputs.amd_runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: extract_tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker image (AMD64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository }}:latest-amd64,ghcr.io/${{ github.repository }}:${{ steps.extract_tag.outputs.TAG }}-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-arm64:
    name: Docker Build (ARM64)
    runs-on: ${{ inputs.arm_runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Enables cross-building linux/arm64 when the fallback runs on a non-arm runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: extract_tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker image (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository }}:latest-arm64,ghcr.io/${{ github.repository }}:${{ steps.extract_tag.outputs.TAG }}-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-manifest:
    name: Create Multi-arch Manifest
    runs-on: ${{ inputs.amd_runner }}
    needs: [docker-amd64, docker-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: extract_tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create and push manifest for latest
        run: |
          docker buildx imagetools create -t ghcr.io/${{ github.repository }}:latest \
            ghcr.io/${{ github.repository }}:latest-amd64 \
            ghcr.io/${{ github.repository }}:latest-arm64

      - name: Create and push manifest for tag
        run: |
          docker buildx imagetools create -t ghcr.io/${{ github.repository }}:${{ steps.extract_tag.outputs.TAG }} \
            ghcr.io/${{ github.repository }}:${{ steps.extract_tag.outputs.TAG }}-amd64 \
            ghcr.io/${{ github.repository }}:${{ steps.extract_tag.outputs.TAG }}-arm64
