name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oil_auth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate schema.sql
        run: bun x @better-auth/cli@latest generate --yes --config ./src/providers/betterauth/schema/auth.ts --output ./src/providers/betterauth/schema/schema.sql
        env:
          DB_POSTGRES_HOST: localhost
          DB_POSTGRES_PORT: 5432
          DB_POSTGRES_NAME: oil_auth_test
          DB_POSTGRES_USER: postgres
          DB_POSTGRES_PASSWORD: postgres
          DB_POSTGRES_SSL_MODE: disable

      - name: Run database migrations
        run: bun x @better-auth/cli@latest migrate --yes --config ./src/providers/betterauth/schema/auth.ts
        env:
          DB_POSTGRES_HOST: localhost
          DB_POSTGRES_PORT: 5432
          DB_POSTGRES_NAME: oil_auth_test
          DB_POSTGRES_USER: postgres
          DB_POSTGRES_PASSWORD: postgres
          DB_POSTGRES_SSL_MODE: disable

      - name: Run linter
        run: bun run lint

      - name: Run unit tests
        run: bun run test:unit

      - name: Run integration tests
        run: bun run test:integration
        env:
          DB_POSTGRES_HOST: localhost
          DB_POSTGRES_PORT: 5432
          DB_POSTGRES_NAME: oil_auth_test
          DB_POSTGRES_USER: postgres
          DB_POSTGRES_PASSWORD: postgres
          DB_POSTGRES_SSL_MODE: disable
          CACHE_REDIS_HOST: localhost
          CACHE_REDIS_PORT: 6379
          OTEL_ENABLED: false

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          DB_POSTGRES_HOST: localhost
          DB_POSTGRES_PORT: 5432
          DB_POSTGRES_NAME: oil_auth_test
          DB_POSTGRES_USER: postgres
          DB_POSTGRES_PASSWORD: postgres
          DB_POSTGRES_SSL_MODE: disable
          CACHE_REDIS_HOST: localhost
          CACHE_REDIS_PORT: 6379
          OTEL_ENABLED: false

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run type check
        run: bun run typecheck
