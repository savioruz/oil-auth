name: CI

on:
  push:
    branches: [main, staging, next]
  pull_request:
    branches: [main, staging, next]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Runs on ubuntu-latest first; if that attempt fails (e.g. a hosted-runner outage), the same
# checks re-run on self-hosted. `continue-on-error` on the primary is what makes the fallback
# real: a hosted failure does NOT fail the run when the fallback succeeds, so the run still
# concludes "success" and the downstream CD (which triggers on CI success) still fires. Only if
# BOTH attempts fail does the run go red.
jobs:
  verify:
    name: ubuntu-latest
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      passed: ${{ steps.mark.outputs.passed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify
        uses: ./.github/actions/ci-verify

      - name: Mark passed
        id: mark
        run: echo "passed=true" >> "$GITHUB_OUTPUT"

  verify-fallback:
    name: self-hosted fallback
    needs: [verify]
    if: ${{ !cancelled() && needs.verify.outputs.passed != 'true' }}
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify
        uses: ./.github/actions/ci-verify
