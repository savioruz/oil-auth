services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - APP_PORT=${APP_PORT:-3000}
      - APP_NAME=${APP_NAME:-auth-service}
      - APP_CORS_ENABLE=${APP_CORS_ENABLE:-true}
      - APP_CORS_ALLOW_CREDENTIALS=${APP_CORS_ALLOW_CREDENTIALS:-true}
      - APP_CORS_ALLOWED_HEADERS=${APP_CORS_ALLOWED_HEADERS:-Accept,Authorization,Content-Type,X-API-KEY,Set-Cookie}
      - APP_CORS_ALLOWED_METHODS=${APP_CORS_ALLOWED_METHODS:-GET,PUT,POST,PATCH,DELETE,OPTIONS}
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - APP_CORS_MAX_AGE_SECONDS=${APP_CORS_MAX_AGE_SECONDS:-300}
      - DB_POSTGRES_HOST=postgres
      - DB_POSTGRES_PORT=${DB_POSTGRES_PORT:-5432}
      - DB_POSTGRES_NAME=${DB_POSTGRES_NAME:-oil_auth}
      - DB_POSTGRES_USER=${DB_POSTGRES_USER:-postgres}
      - DB_POSTGRES_PASSWORD=${DB_POSTGRES_PASSWORD:-postgres}
      - DB_POSTGRES_TIMEZONE=${DB_POSTGRES_TIMEZONE:-UTC}
      - DB_POSTGRES_SSL_MODE=${DB_POSTGRES_SSL_MODE:-disable}
      - CACHE_REDIS_HOST=redis
      - CACHE_REDIS_PORT=${CACHE_REDIS_PORT:-6379}
      - CACHE_REDIS_PASSWORD=${CACHE_REDIS_PASSWORD:-strongpassword}
      - CACHE_REDIS_DB=${CACHE_REDIS_DB:-0}
      - CACHE_REDIS_TLS=${CACHE_REDIS_TLS:-false}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_PROTOCOL=${OTEL_PROTOCOL:-grpc}
      - OTEL_ENDPOINT=${OTEL_ENDPOINT:-localhost:4317}
      - SESSION_EXPIRES_IN=${SESSION_EXPIRES_IN:-604800}
      - SESSION_UPDATE_AGE=${SESSION_UPDATE_AGE:-86400}
      - SESSION_COOKIE_CACHE_MAX_AGE=${SESSION_COOKIE_CACHE_MAX_AGE:-300}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_POSTGRES_NAME:-oil_auth}
    ports:
      - "${DB_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oil-redis
    command: redis-server --requirepass ${CACHE_REDIS_PASSWORD:-strongpassword}
    ports:
      - "${CACHE_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
